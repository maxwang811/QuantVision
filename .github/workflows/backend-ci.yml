name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: backend

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: quantvision
          POSTGRES_PASSWORD: quantvision
          POSTGRES_DB: quantvision_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quantvision"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      QV_TEST_DATABASE_URL: postgresql+psycopg://quantvision:quantvision@localhost:5432/quantvision_test
      DATABASE_URL: postgresql+psycopg://quantvision:quantvision@localhost:5432/quantvision_test

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.7"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen || uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy app || true  # mypy is informational for now

      - name: Run tests
        run: uv run pytest -n auto --cov=app
